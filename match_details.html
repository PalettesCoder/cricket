<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Details | HR Cricket</title>
    <link rel="icon" href="https://raw.githubusercontent.com/lucide-icons/lucide/main/icons/trophy.svg">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        :root {
            --primary: #DE1F26;
            --primary-dark: #B9141B;
            --bg: #F4F7F9;
            --card: #FFFFFF;
            --text-dark: #121212;
            --text-gray: #5F6D7A;
            --border: #E8EDF1;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text-dark); }

        .top-nav {
            background: #FFFFFF;
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 40px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-gray);
            font-weight: 600;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .detail-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .match-header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 40px;
        }

        .match-type {
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 800;
            display: inline-block;
            margin-bottom: 15px;
        }

        .match-name {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .score-section {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 40px;
            margin: 40px 0;
        }

        .team-info {
            text-align: center;
        }

        .team-name {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .team-score {
            font-size: 36px;
            font-weight: 900;
            color: var(--primary);
        }

        .vs {
            font-weight: 800;
            color: var(--text-gray);
            font-size: 24px;
        }

        .status-box {
            background: #F8FAFC;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            margin-top: 20px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 20px;
        }

        .scorecard-item {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        .scorecard-item:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <header class="top-nav">
        <a href="schedule.html" class="logo">
            <i class="ph-fill ph-baseball"></i>
            HR CRICKET
        </a>
    </header>

    <div class="container">
        <a href="stats_center.html" class="btn-back">
            <i class="ph ph-arrow-left"></i> BACK TO LIVE SCORES
        </a>

        <div class="detail-card" id="match-details">
            <div style="text-align: center; padding: 100px;">
                <i class="ph ph-circle-notch ph-spin" style="font-size: 40px; color: var(--primary);"></i>
                <p style="margin-top: 20px; color: var(--text-gray);">Loading match data...</p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        async function loadMatchDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const matchId = urlParams.get('id');
            
            if (!matchId) {
                document.getElementById('match-details').innerHTML = '<h2>No match ID specified.</h2>';
                return;
            }

            try {
                const data = await CricketAPI.getMatchInfo(matchId);
                const container = document.getElementById('match-details');
                
                if (data) {
                    let scoreHtml = '';
                    if (data.score && data.score.length > 0) {
                        data.score.forEach(s => {
                            scoreHtml += `
                                <div class="scorecard-item">
                                    <span style="font-weight: 600;">${s.inning}</span>
                                    <span style="font-weight: 800; color: var(--primary); font-size: 20px;">${s.r}/${s.w} <span style="font-size: 14px; color: var(--text-gray);">(${s.o} ov)</span></span>
                                </div>
                            `;
                        });
                    }

                    container.innerHTML = `
                        <div class="match-header">
                            <span class="match-type">${data.matchType?.toUpperCase() || 'MATCH'}</span>
                            <h1 class="match-name">${data.name}</h1>
                            <p style="color: var(--text-gray);"><i class="ph ph-map-pin"></i> ${data.venue || 'Venue TBD'}</p>
                        </div>

                        <div style="margin-top: 40px;">
                            <h3 style="margin-bottom: 20px; font-family: 'Outfit';">Detailed Scorecard</h3>
                            <div style="border: 1px solid var(--border); border-radius: 12px; overflow: hidden;">
                                ${scoreHtml || '<p style="padding: 20px; text-align: center; color: var(--text-gray);">Scorecard data not yet available.</p>'}
                            </div>
                        </div>

                        <div class="status-box">
                            <i class="ph ph-info"></i> ${data.status || 'Match in progress'}
                        </div>
                    `;
                } else {
                    container.innerHTML = '<h2>Failed to load match data.</h2>';
                }
            } catch (err) {
                console.error(err);
                document.getElementById('match-details').innerHTML = '<h2>Error connecting to API.</h2>';
            }
        }

        window.onload = loadMatchDetails;
    </script>
</body>
</html>
