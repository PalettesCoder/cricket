<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News & Blogs | Cricket Hub</title>
    <link rel="icon" href="https://raw.githubusercontent.com/lucide-icons/lucide/main/icons/trophy.svg">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        :root {
            --primary: #DE1F26;
            --bg: #F4F7F9;
            --card: #FFFFFF;
            --text-dark: #121212;
            --text-gray: #5F6D7A;
            --border: #E8EDF1;
            --radius: 12px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-dark);
        }

        .top-nav {
            background: #FFFFFF;
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 40px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .main-nav-links {
            display: flex;
            gap: 32px;
            margin-left: 60px;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 15px;
            padding: 20px 0;
            position: relative;
        }

        .nav-link.active {
            color: var(--primary);
        }

        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--primary);
        }

        .content-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-header {
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        /* Blog Categories */
        .category-scroll {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .category-tab {
            padding: 8px 20px;
            background: #FFFFFF;
            border: 1px solid var(--border);
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-gray);
            cursor: pointer;
            white-space: nowrap;
        }

        .category-tab.active {
            background: var(--primary);
            color: #FFFFFF;
            border-color: var(--primary);
        }

        /* Featured Post */
        .featured-post {
            background: #FFFFFF;
            border-radius: 20px;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            margin-bottom: 48px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .featured-img {
            background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 100%);
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: var(--primary);
            opacity: 0.8;
            background-image: url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?auto=format&fit=crop&q=80&w=1200');
            background-size: cover;
            background-position: center;
        }

        .featured-content {
            padding: 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .post-label {
            color: var(--primary);
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        .featured-title {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 16px;
        }

        .post-excerpt {
            color: var(--text-gray);
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .post-meta {
            font-size: 13px;
            color: var(--text-gray);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Blog Grid */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 32px;
        }

        .blog-card {
            background: #FFFFFF;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .blog-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow);
        }

        .card-img {
            height: 200px;
            background: #F8FAFB;
            background-size: cover;
            background-position: center;
        }

        .card-body {
            padding: 24px;
            flex: 1;
        }

        .card-title {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .btn-read {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 15px;
        }

        @media (max-width: 768px) {
            .featured-post { grid-template-columns: 1fr; }
            .top-nav { padding: 0 20px; }
            .content-container { padding: 0 20px; }
            .main-nav-links { display: none; }
        }
    </style>
</head>
<body>

    <header class="top-nav">
        <a href="schedule.html" class="logo">
            <i class="ph-fill ph-baseball"></i>
            CRICKET HUB
        </a>
        <nav class="main-nav-links">
            <a href="schedule.html" class="nav-link">Schedule</a>
            <a href="stats_center.html" class="nav-link">Live Scores</a>
            <a href="comparison.html" class="nav-link">Player Comparison</a>
            <a href="blogs.html" class="nav-link active">News & Blogs</a>
        </nav>
    </header>

    <div class="content-container">
        <div class="page-header">
            <h1>Insights & Analysis</h1>
            <p style="color: var(--text-gray);">Fresh perspectives on the Gentleman's Game.</p>
        </div>

        <div class="category-scroll">
            <div class="category-tab active">All Stories</div>
            <div class="category-tab">Match Analysis</div>
            <div class="category-tab">Player Spotlights</div>
            <div class="category-tab">Statistics</div>
            <div class="category-tab">Technical Review</div>
        </div>

        <!-- Featured Post (Dynamic) -->
        <div class="featured-post" id="featured-blog" style="display: none;">
            <div id="featured-img" class="featured-img" style="background-image: url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?auto=format&fit=crop&q=80&w=1200');"></div>
            <div class="featured-content">
                <span id="featured-category" class="post-label">FEATURED ANALYSIS</span>
                <h2 id="featured-title" class="featured-title">...</h2>
                <p id="featured-excerpt" class="post-excerpt">...</p>
                <div class="post-meta">
                    <span id="featured-date">...</span>
                    <span>•</span>
                    <span id="featured-time">...</span>
                </div>
                <a href="#" class="btn-read" style="margin-top: 25px;">READ FULL STORY <i class="ph ph-arrow-right"></i></a>
            </div>
        </div>

        <!-- Secondary Grid -->
        <div id="blog-grid" class="blog-grid">
            <!-- Dynamic blogs will be injected here -->
            <div class="blog-card" style="padding: 40px; text-align: center;">
                <p style="color: var(--text-gray);">Fetching analysis from the vault...</p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        async function loadBlogs() {
            const grid = document.getElementById('blog-grid');
            const blogs = await CricketAPI.getBlogs();
            
            if (blogs && blogs.length > 0) {
                // Populate Featured
                const featured = blogs[0];
                document.getElementById('featured-blog').style.display = 'grid';
                document.getElementById('featured-title').innerText = featured.title;
                document.getElementById('featured-excerpt').innerText = featured.excerpt;
                document.getElementById('featured-category').innerText = featured.category || 'ANALYSIS';
                document.getElementById('featured-date').innerText = new Date(featured.createdAt).toLocaleDateString();
                document.getElementById('featured-time').innerText = `${featured.readingTime} Min Read`;
                if (featured.imageUrl) {
                    document.getElementById('featured-img').style.backgroundImage = `url(${featured.imageUrl})`;
                }

                // Populate Grid (Remaining blogs)
                grid.innerHTML = '';
                blogs.slice(1).forEach(post => {
                    const card = document.createElement('article');
                    card.className = 'blog-card';
                    card.innerHTML = `
                        <div class="card-img" style="background-image: url('${post.imageUrl || 'https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?auto=format&fit=crop&q=80&w=800'}');"></div>
                        <div class="card-body">
                            <span class="post-label">${post.category || 'ANALYSIS'}</span>
                            <h3 class="card-title">${post.title}</h3>
                            <p class="post-excerpt" style="font-size: 14px;">${post.excerpt}</p>
                            <div class="post-meta" style="margin-top: 20px;">
                                <span>${new Date(post.createdAt).toLocaleDateString()}</span>
                                <span>•</span>
                                <span>${post.readingTime} Min Read</span>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } else {
                grid.innerHTML = '<div class="blog-card" style="padding: 40px; text-align: center;"><p style="color: var(--text-gray);">Working under progress. No data available at the moment.</p></div>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadBlogs);
    </script>
</body>
</html>
