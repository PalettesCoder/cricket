<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule | Cricket Hub</title>
    <link rel="icon" href="https://raw.githubusercontent.com/lucide-icons/lucide/main/icons/trophy.svg">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        :root {
            --primary: #DE1F26;
            --primary-soft: #FFF1F2;
            --bg: #F4F7F9;
            --card: #FFFFFF;
            --text-dark: #121212;
            --text-gray: #5F6D7A;
            --border: #E8EDF1;
            --radius: 12px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-dark);
        }

        .top-nav {
            background: #FFFFFF;
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 40px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .main-nav-links {
            display: flex;
            gap: 32px;
            margin-left: 60px;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 15px;
            padding: 20px 0;
            position: relative;
        }

        .nav-link.active {
            color: var(--primary);
        }

        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--primary);
        }

        .content-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        /* Filter Chips */
        .filter-section {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none;
        }

        .filter-chip {
            padding: 8px 20px;
            background: #FFFFFF;
            border: 1px solid var(--border);
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-gray);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .filter-chip.active {
            background: var(--primary);
            color: #FFFFFF;
            border-color: var(--primary);
        }

        /* Schedule Grid */
        .schedule-group {
            margin-bottom: 40px;
        }

        .group-date {
            font-size: 14px;
            font-weight: 800;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .group-date::after {
            content: '';
            height: 1px;
            background: var(--border);
            flex: 1;
        }

        .schedule-card {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 24px;
            margin-bottom: 16px;
            display: grid;
            grid-template-columns: 100px 1fr 150px;
            align-items: center;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
        }

        .schedule-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
            border-color: var(--primary);
        }

        .match-time {
            font-weight: 800;
            font-size: 18px;
        }

        .match-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .match-name {
            font-weight: 700;
            font-size: 16px;
        }

        .series-name {
            font-size: 13px;
            color: var(--text-gray);
            font-weight: 500;
        }

        .match-venue {
            font-size: 12px;
            color: var(--text-gray);
        }

        .match-actions {
            text-align: right;
        }

        .btn-remind {
            background: var(--primary-soft);
            color: var(--primary);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            margin-left: auto;
        }

        @media (max-width: 768px) {
            .schedule-card {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .match-actions {
                text-align: left;
            }
            .btn-remind {
                margin-left: 0;
            }
            .main-nav-links { display: none; }
        }

        /* Full Page Loader */
        #page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s ease, visibility 0.4s;
        }

        #page-loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader-text {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="page-loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">Loading Schedule...</div>
    </div>

    <header class="top-nav">
        <a href="schedule.html" class="logo">
            <i class="ph-fill ph-baseball"></i>
            CRICKET HUB
        </a>
        <nav class="main-nav-links">
            <a href="schedule.html" class="nav-link active">Schedule</a>
            <a href="stats_center.html" class="nav-link">Live Scores</a>
            <a href="comparison.html" class="nav-link">Player Comparison</a>
            <a href="blogs.html" class="nav-link">News & Blogs</a>
        </nav>
    </header>

    <div class="content-container">
        <div class="page-header">
            <h1>Cricket Schedule</h1>
            <p style="color: var(--text-gray);">Stay updated with upcoming matches and tournaments.</p>
        </div>

        <div class="filter-section">
            <div class="filter-chip active">All Matches</div>
            <div class="filter-chip">International</div>
            <div class="filter-chip">T20 Leagues</div>
            <div class="filter-chip">Domestic</div>
            <div class="filter-chip">Women</div>
        </div>

        <div id="schedule-container">
            <div class="schedule-group">
                <div class="card-body" style="text-align: center; padding: 40px; background: white; border-radius: 12px; border: 1px solid var(--border);">
                    <p style="color: var(--text-gray);">Fetching latest cricket calendar...</p>
                </div>
            </div>
        </div>

    </div>

    <script src="js/api.js"></script>
    <script>
        async function loadSchedule() {
            const container = document.getElementById('schedule-container');
            const loader = document.getElementById('page-loader');
            
            try {
                const schedules = await CricketAPI.getUpcomingSchedules();
                
                if (schedules && schedules.length > 0) {
                    container.innerHTML = '';
                    
                    // Group by date
                    const groups = schedules.reduce((acc, match) => {
                        const date = new Date(match.matchTime).toLocaleDateString(undefined, {
                            weekday: 'long', day: '2-digit', month: 'long'
                        });
                        if (!acc[date]) acc[date] = [];
                        acc[date].push(match);
                        return acc;
                    }, {});

                    Object.keys(groups).forEach(date => {
                        const groupDiv = document.createElement('div');
                        groupDiv.className = 'schedule-group';
                        groupDiv.innerHTML = `<div class="group-date">${date}</div>`;
                        
                        groups[date].forEach(match => {
                            const time = new Date(match.matchTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                            const card = document.createElement('div');
                            card.className = 'schedule-card';
                            card.innerHTML = `
                                <div class="match-time">${time}</div>
                                <div class="match-details">
                                    <div class="match-name">${match.matchName}</div>
                                    <div class="series-name">${match.series} • ${match.category}</div>
                                    <div class="match-venue">${match.venue}</div>
                                </div>
                                <div class="match-actions">
                                    <a href="series_details.html?id=${match.apiId}" class="btn-remind" style="text-decoration: none;">
                                        <i class="ph ph-exam"></i> Series Details
                                    </a>
                                </div>
                            `;
                            groupDiv.appendChild(card);
                        });
                        container.appendChild(groupDiv);
                    });
                } else {
                    container.innerHTML = '<div class="schedule-group"><p style="text-align:center; padding: 40px; color: var(--text-gray);">Working under progress. No upcoming matches found in the global calendar.</p></div>';
                }
            } catch (err) {
                console.error("Schedule load error:", err);
                container.innerHTML = '<div class="schedule-group"><p style="text-align:center; padding: 40px; color: var(--text-gray);">Working under progress. Unable to fetch calendar.</p></div>';
            } finally {
                loader.classList.add('hidden');
            }
        }

        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelector('.filter-chip.active').classList.remove('active');
                chip.classList.add('active');
            });
        });

        document.addEventListener('DOMContentLoaded', loadSchedule);
    </script>
</body>
</html>
